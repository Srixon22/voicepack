<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张先生语音包</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif;
            padding: 20px; 
            background: linear-gradient(180deg, #b3d9ff 0%, #ffffff 100%);
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* 星星掉落动画 */
        .star {
            position: absolute;
            top: -10px;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) translateX(50px);
                opacity: 0;
            }
        }

        h2 { 
            color: #4682B4; 
            margin-bottom: 25px; 
            z-index: 10;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }

        #buttonContainer { 
            display: grid; 
            grid-template-columns: 1fr; /* 强制单列，实现长方形横向排列 */
            gap: 12px; 
            width: 100%;
            max-width: 400px;
            flex: 1;
            z-index: 10;
        }

        .voice-btn {
            position: relative;
            overflow: hidden;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.7);
            color: #333;
            border: 1px solid #add8e6;
            border-radius: 8px; /* 较小的圆角，更像标准长方形 */
            cursor: pointer;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            -webkit-tap-highlight-color: transparent;
        }

        .voice-btn:active {
            transform: scale(0.98);
            background: #e6f3ff;
            border-color: #007bff;
        }

        footer {
            margin-top: 30px;
            padding: 15px;
            color: #88a0b9;
            font-size: 12px;
            z-index: 10;
        }

        .loading { color: #88a0b9; text-align: center; }
    </style>
</head>
<body>

    <h2>张先生语音包</h2>

    <div id="buttonContainer" class="loading">正在同步列表...</div>

    <footer>Version V1.02</footer>

    <script>
        // 生成随机掉落的星星
        function createStars() {
            for (let i = 0; i < 20; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(star);
            }
        }
        createStars();

        const container = document.getElementById('buttonContainer');
        const audioPlayer = new Audio();

        fetch('./list.json')
            .then(res => res.json())
            .then(data => {
                container.innerHTML = '';
                container.classList.remove('loading');
                data.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'voice-btn';
                    btn.innerText = item.name;
                    
                    btn.onclick = () => {
                        audioPlayer.src = `./audio/${item.file}`;
                        audioPlayer.play().catch(e => {});
                    };

                    container.appendChild(btn);
                });
            })
            .catch(err => {
                container.innerText = '加载失败';
            });
    </script>
</body>
</html>
