<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张先生语音包</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background: #f4f4f9; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        h2 { color: #333; margin-bottom: 20px; }
        #buttonContainer { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 10px; 
            width: 100%;
            max-width: 800px;
            flex: 1;
        }
        .voice-btn {
            padding: 15px 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            font-size: 14px;
        }
        .voice-btn:hover { background: #0056b3; }
        .voice-btn:active { background: #004085; transform: scale(0.95); }
        footer {
            margin-top: 20px;
            padding: 15px;
            color: #888;
            font-size: 12px;
        }
        .loading { color: #888; grid-column: 1 / -1; text-align: center; }
    </style>
</head>

    <h2>张先生语音包</h2>
