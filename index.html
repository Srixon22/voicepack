<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张先生语音包</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px; 
            /* 保留源代码的动态渐变背景 */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 { 
            color: white; 
            margin-top: 30px;
            margin-bottom: 25px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 模拟图片中的喇叭图标 */
        h2::before {
            content: "🔊"; 
            font-size: 1.1em;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }

        /* 核心布局修改：固定每行4列的长方形排列 */
        #buttonContainer { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            width: 100%;
            max-width: 900px;
            flex: 1;
        }

        /* 按钮样式修改：扁平长方形、纯白底、灰色文字 */
        .voice-btn {
            position: relative;
            overflow: hidden;
            /* 增加上下内边距使按钮变长方形 */
            padding: 22px 10px; 
            background: #ffffff; 
            
            /* 灰色文字，不再加粗 */
            color: #555; 
            border: none;
            border-radius: 10px; 
            cursor: pointer;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            font-size: 15px;
            font-weight: 400;
            
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent;
        }

        .voice-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .voice-btn:active {
            transform: scale(0.95);
            background: #f0f0f0;
        }

        /* 适配白色按钮的灰色波纹 */
        .ripple {
            position: absolute;
            background: rgba(0, 0, 0, 0.1); 
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.5s linear;
            pointer-events: none;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        footer {
            margin-top: 30px;
            padding: 15px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .loading { color: white; grid-column: 1 / -1; text-align: center; }

        /* 手机端适配：窄屏下改为每行2个，防止长方形太窄文字重叠 */
        @media (max-width: 600px) {
            #buttonContainer {
                grid-template-columns: repeat(2, 1fr);
            }
            .voice-btn {
                padding: 18px 10px;
            }
        }
    </style>
</head>
<body>

    <h2>张先生语音包</h2>

    <div id="buttonContainer" class="loading">正在同步列表...</div>

    <footer>Version V1.02</footer>

    <script>
        const container = document.getElementById('buttonContainer');
        const audioPlayer = new Audio();

        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            const rect = button.getBoundingClientRect();

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - rect.left - radius}px`;
            circle.style.top = `${event.clientY - rect.top - radius}px`;
            circle.classList.add("ripple");

            const ripple = button.getElementsByClassName("ripple")[0];
            if (ripple) { ripple.remove(); }
            button.appendChild(circle);
        }

        fetch('./list.json')
            .then(res => res.json())
            .then(data => {
                container.innerHTML = '';
                container.classList.remove('loading');
                data.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'voice-btn';
                    btn.innerText = item.name;
                    
                    btn.addEventListener('click', (e) => {
                        createRipple(e);
                        audioPlayer.src = `./audio/${item.file}`;
                        audioPlayer.play().catch(e => {});
                    });

                    container.appendChild(btn);
                });
            })
            .catch(err => {
                container.innerText = '加载失败';
            });
    </script>
</body>
</html>
